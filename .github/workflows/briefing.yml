name: Daily Briefing

on:
  schedule:
    # Runs at key times on weekdays (UTC)
    # 10 UTC = 6 AM ET, 14 UTC = 10 AM ET, 20 UTC = 4 PM ET, 22 UTC = 6 PM ET
    - cron: '0 10,14,20,22 * * 1-5'
  workflow_dispatch:
    inputs:
      user:
        description: 'Run for specific user (leave blank for schedule-match)'
        required: false
        type: string

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Run briefing
        run: |
          if [ -n "$USER_INPUT" ]; then
            node src/index.js --user "$USER_INPUT"
          else
            node src/index.js --schedule-match
          fi
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          USER_INPUT: ${{ inputs.user }}

      - name: Notify on failure
        if: failure()
        run: |
          node --input-type=module -e "
            import {Resend} from 'resend';
            const r = new Resend(process.env.RESEND_API_KEY);
            await r.emails.send({
              from: process.env.RESEND_FROM || 'Stock News Bot <briefing@redwooddigitalfrederick.com>',
              to: 'koalokangaroo22@gmail.com',
              subject: '[ALERT] Stock News Bot failed',
              text: 'The daily briefing workflow failed. Check: https://github.com/SubliminalCoding/stock-news-bot/actions'
            });
            console.log('Failure alert sent');
          "
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          USER_INPUT: ${{ inputs.user }}
